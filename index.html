<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip-Flop Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <input type="checkbox" id="flip">
        <div class="login-box">
            <div class="front">
                <h2>Login</h2>
                <form>
                    <div class="input-group">
                        <input type="text" required>
                        <label>Username</label>
                    </div>
                    <div class="input-group">
                        <input type="password" required>
                        <label>Password</label>
                    </div>
                    <button type="submit">Login</button>
                    <p class="toggle-text">Don't have an account? <label for="flip">Sign Up</label></p>
                </form>
            </div>
            <div class="back">
                <h2>Sign Up</h2>
                <form>
                    <div class="input-group">
                        <input type="text" required>
                        <label>Full Name</label>
                    </div>
                    <div class="input-group">
                        <input type="email" required>
                        <label>Email</label>
                    </div>
                    <div class="input-group">
                        <input type="password" required>
                        <label>Password</label>
                    </div>
                    <button type="submit">Sign Up</button>
                    <p class="toggle-text">Already have an account? <label for="flip">Login</label></p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
